        // Terminal
        async function executeCommand() {
            const input = document.getElementById('terminalInput');
            const command = input.value.trim();
            if (!command) return;
            
            const output = document.getElementById('terminalOutput');
            output.innerHTML += `<div class="terminal-line"><span class="terminal-prompt">$</span> ${escapeHtml(command)}</div>`;
            input.value = '';
            
            // Check for built-in commands
            if (command === 'help') {
                output.innerHTML += `<div class="terminal-line terminal-info">Available commands:
  help     - Show this help
  clear    - Clear terminal
  tools    - List available tools
  web      - Web search
  fetch    - Fetch URL
  shell    - Execute shell command
  memory   - Memory operations</div>`;
                output.scrollTop = output.scrollHeight;
                return;
            }
            
            if (command === 'clear') {
                output.innerHTML = '';
                return;
            }
            
            if (command === 'tools') {
                try {
                    const res = await fetch(`${API}/tools`);
                    const data = await res.json();
                    if (data.success) {
                        output.innerHTML += `<div class="terminal-line terminal-info">Available tools:</div>`;
                        data.tools.forEach(t => {
                            output.innerHTML += `<div class="terminal-line">  ${t.name} - ${t.description}</div>`;
                        });
                    }
                } catch (e) {
                    output.innerHTML += `<div class="terminal-line terminal-error">Error: ${e.message}</div>`;
                }
                output.scrollTop = output.scrollHeight;
                return;
            }
            
            // Send to API
            try {
                const res = await fetch(`${API}/shell`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });
                const data = await res.json();
                
                if (data.success) {
                    if (data.stdout) output.innerHTML += `<div class="terminal-line">${escapeHtml(data.stdout)}</div>`;
                    if (data.stderr) output.innerHTML += `<div class="terminal-line terminal-error">${escapeHtml(data.stderr)}</div>`;
                } else {
                    output.innerHTML += `<div class="terminal-line terminal-error">Error: ${data.error || 'Command failed'}</div>`;
                }
            } catch (e) {
                output.innerHTML += `<div class="terminal-line terminal-error">Error: ${e.message}</div>`;
            }
            
            output.scrollTop = output.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Create window
        function createWindow(id, title, content, width = 500, height = 400) {
            const container = document.getElementById('windowsContainer');
            const win = document.createElement('div');
            win.id = `window-${id}`;
            win.className = 'window fade-in';
            win.style.width = `${width}px`;
            win.style.height = `${height}px`;
            win.style.left = `${(window.innerWidth - width) / 2}px`;
            win.style.top = `${(window.innerHeight - height) / 2 - 30}px`;
            win.style.zIndex = ++windowZIndex;
            
            win.innerHTML = `
                <div class="window-header">
                    <div class="window-title">
                        <span>${title}</span>
                    </div>
                    <div class="window-controls">
                        <button class="window-btn minimize" onclick="minimizeWindow('${id}')"></button>
                        <button class="window-btn maximize" onclick="maximizeWindow('${id}')"></button>
                        <button class="window-btn close" onclick="closeWindow('${id}')"></button>
                    </div>
                </div>
                <div class="window-content">${content}</div>
                <div class="window-resize-handle"></div>
            `;
            
            container.appendChild(win);
            openWindows[id] = true;
            makeDraggable(win);
            makeResizable(win);
        }
        
        // Window controls
        function closeWindow(id) {
            const win = document.getElementById(`window-${id}`);
            if (win) win.remove();
            document.getElementById(`taskbar-${id}`)?.classList.remove('active');
            delete openWindows[id];
        }
        
        function minimizeWindow(id) {
            const win = document.getElementById(`window-${id}`);
            if (win) win.classList.toggle('minimized');
        }
        
        function maximizeWindow(id) {
            const win = document.getElementById(`window-${id}`);
            if (win) {
                if (win.style.width === '100%') {
                    win.style.width = '500px';
                    win.style.height = '400px';
                    win.style.left = `${(window.innerWidth - 500) / 2}px`;
                    win.style.top = `${(window.innerHeight - 400) / 2 - 30}px`;
                } else {
                    win.style.width = '100%';
                    win.style.height = 'calc(100vh - 50px)';
                    win.style.left = '0';
                    win.style.top = '0';
                }
            }
        }
        
        // Make window draggable (mouse + touch)
        function makeDraggable(win) {
            const header = win.querySelector('.window-header');
            let isDragging = false;
            let offsetX, offsetY;
            
            // Mouse events
            header.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('window-btn')) return;
                isDragging = true;
                offsetX = e.clientX - win.offsetLeft;
                offsetY = e.clientY - win.offsetTop;
                win.style.zIndex = ++windowZIndex;
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                win.style.left = `${e.clientX - offsetX}px`;
                win.style.top = `${e.clientY - offsetY}px`;
            });
            
            document.addEventListener('mouseup', () => { isDragging = false; });
            
            // Touch events for mobile
            header.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('window-btn')) return;
                isDragging = true;
                const touch = e.touches[0];
                offsetX = touch.clientX - win.offsetLeft;
                offsetY = touch.clientY - win.offsetTop;
                win.style.zIndex = ++windowZIndex;
                e.preventDefault();
            }, { passive: false });
            
            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const touch = e.touches[0];
                win.style.left = `${touch.clientX - offsetX}px`;
                win.style.top = `${touch.clientY - offsetY}px`;
            }, { passive: false });
            
            document.addEventListener('touchend', () => { isDragging = false; });
        }
        
        // Make window resizable
        function makeResizable(win) {
            const handle = win.querySelector('.window-resize-handle');
            if (!handle) return;
            
            let isResizing = false;
            let startX, startY, startW, startH;
            
            handle.addEventListener('mousedown', (e) => {
                isResizing = true;
                startX = e.clientX;
                startY = e.clientY;
                startW = win.offsetWidth;
                startH = win.offsetHeight;
                e.preventDefault();
                e.stopPropagation();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const newW = startW + (e.clientX - startX);
                const newH = startH + (e.clientY - startY);
                if (newW >= 300) win.style.width = `${newW}px`;
                if (newH >= 200) win.style.height = `${newH}px`;
            });
            
            document.addEventListener('mouseup', () => { isResizing = false; });
            
            // Touch support for resizing
            handle.addEventListener('touchstart', (e) => {
                isResizing = true;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                startW = win.offsetWidth;
                startH = win.offsetHeight;
                e.preventDefault();
                e.stopPropagation();
            }, { passive: false });
            
            document.addEventListener('touchmove', (e) => {
                if (!isResizing) return;
                const touch = e.touches[0];
                const newW = startW + (touch.clientX - startX);
                const newH = startH + (touch.clientY - startY);
                if (newW >= 300) win.style.width = `${newW}px`;
                if (newH >= 200) win.style.height = `${newH}px`;
            }, { passive: false });
            
            document.addEventListener('touchend', () => { isResizing = false; });
        }
        
        // Open file
        async function openFile(name, isDir, displayName) {
            if (isDir) {
                openFolderWindow(name, displayName || name.split('/').pop());
            } else {
                const ext = name.split('.').pop().toLowerCase();
                const binaryExts  = ['pdf', 'png', 'jpg', 'jpeg', 'gif', 'bmp', 'webp', 'zip', 'tar', 'gz', 'mp3', 'mp4', 'webm', 'mov', 'mkv', 'avi', 'm4v', 'wav', 'ogg', 'flac', 'm4a'];
                const viewerExts  = ['html', 'htm', 'xhtml', 'svg', 'wasm'];
                if (binaryExts.includes(ext)) {
                    downloadOrViewFile(name, ext);
                } else if (viewerExts.includes(ext)) {
                    openHtmlViewer(name);
                } else {
                    openFileEditor(name);
                }
            }
        }

        // Download or view binary files (PDF, images, etc.)
        async function openFolderWindow(folderPath, folderName) {
            const winId = 'folder-' + folderPath.replace(/[^a-z0-9]/gi, '-');
            const username = currentUser?.username || 'guest';

            // If window already exists, bring to front
            const existing = document.getElementById(`window-${winId}`);
            if (existing) {
                existing.style.zIndex = ++windowZIndex;
                existing.classList.remove('minimized');
                return;
            }

            const loadFolderFiles = async (path) => {
                const url = path ? `${API}/files/${username}?path=${encodeURIComponent(path)}` : `${API}/files/${username}`;
                const res = await fetch(url);
                const data = await res.json();
                return data.files || [];
            };

            const renderFolder = async (path) => {
                const gridId = `fgrid-${winId}`;
                const breadId = `fbread-${winId}`;
                const folderFiles = await loadFolderFiles(path);

                const parts = path ? path.split('/') : [];
                let bread = `<span onclick="renderFolderInWindow('${winId}', '', '${folderPath}')" style="cursor:pointer;color:#818cf8;">${folderName}</span>`;
                parts.slice(folderPath.split('/').length).forEach((part, i) => {
                    const p = [...folderPath.split('/'), ...parts.slice(folderPath.split('/').length, folderPath.split('/').length + i + 1)].join('/');
                    bread += ` <span style="color:#6b7280;">›</span> <span onclick="renderFolderInWindow('${winId}', '${p}', '${folderPath}')" style="cursor:pointer;color:#818cf8;">${part}</span>`;
                });

                const breadEl = document.getElementById(breadId);
                if (breadEl) breadEl.innerHTML = bread;

                const grid = document.getElementById(gridId);
                if (!grid) return;

                let html = '';
                if (path !== folderPath) {
                    const parentParts = path.split('/');
                    parentParts.pop();
                    const parentPath = parentParts.join('/');
                    html += `<div class="file-item" ondblclick="renderFolderInWindow('${winId}', '${parentPath}', '${folderPath}')">
                        <i class="fas fa-arrow-left" style="color:#9ca3af;font-size:1.2rem;"></i>
                        <span style="color:#9ca3af;">..</span>
                    </div>`;
                }
                html += folderFiles.map(f => {
                    const fullPath = path ? `${path}/${f.name}` : f.name;
                    const icon = f.is_dir ? 'fa-folder text-yellow-400' : getFileIcon(f.name);
                    return `<div class="file-item" ondblclick="${f.is_dir ? `renderFolderInWindow('${winId}','${fullPath}','${folderPath}')` : `openFile('${fullPath}', false, '${f.name}')`}">
                        <i class="fas ${icon}"></i>
                        <span>${f.name}</span>
                    </div>`;
                }).join('');
                if (!html) html = '<div style="grid-column:1/-1;text-align:center;color:#6b7280;padding:20px;">Folder is empty</div>';
                grid.innerHTML = html;
            };

            // Store render function globally for onclick access
            window[`renderFolderInWindow`] = async (wid, path, rootPath) => {
                const gridId = `fgrid-${wid}`;
                const breadId = `fbread-${wid}`;
                const folderFiles = await loadFolderFiles(path);
                const rootName = rootPath.split('/').pop();

                // Breadcrumb: only show when navigated into a subfolder
                const rootParts = rootPath.split('/');
                const subParts = path ? path.split('/').slice(rootParts.length) : [];
                const breadEl = document.getElementById(breadId);
                if (breadEl) {
                    if (subParts.length === 0) {
                        breadEl.style.display = 'none';
                        breadEl.innerHTML = '';
                    } else {
                        breadEl.style.display = 'block';
                        let bread = `<span onclick="renderFolderInWindow('${wid}','${rootPath}','${rootPath}')" style="cursor:pointer;color:#818cf8;">${rootName}</span>`;
                        subParts.forEach((part, i) => {
                            const p = [...rootParts, ...subParts.slice(0, i + 1)].join('/');
                            bread += ` <span style="color:#6b7280;">›</span> <span onclick="renderFolderInWindow('${wid}','${p}','${rootPath}')" style="cursor:pointer;color:#818cf8;">${part}</span>`;
                        });
                        breadEl.innerHTML = bread;
                    }
                }

                const grid = document.getElementById(gridId);
                if (!grid) return;

                let html = '';
                if (path !== rootPath) {
                    const parentParts = path.split('/');
                    parentParts.pop();
                    const parentPath = parentParts.join('/') || rootPath;
                    html += `<div class="file-item" ondblclick="renderFolderInWindow('${wid}','${parentPath}','${rootPath}')">
                        <i class="fas fa-arrow-left" style="color:#9ca3af;font-size:1.2rem;"></i>
                        <span style="color:#9ca3af;">..</span>
                    </div>`;
                }
                html += folderFiles.map(f => {
                    const fullPath = path ? `${path}/${f.name}` : f.name;
                    const icon = f.is_dir ? 'fa-folder text-yellow-400' : getFileIcon(f.name);
                    const dblclick = f.is_dir ? `renderFolderInWindow('${wid}','${fullPath}','${rootPath}')` : `openFile('${fullPath}', false, '${f.name}')`;
                    return `<div class="file-item folder-win-item"
                         draggable="true"
                         data-dnd-path="${fullPath}"
                         data-dnd-name="${f.name}"
                         data-dnd-isdir="${f.is_dir}"
                         onclick="selectFolderItem(this)"
                         ondblclick="${dblclick}"
                         oncontextmenu="event.stopPropagation();event.preventDefault();setFolderContext('${fullPath}','${f.name}',${f.is_dir},'${wid}','${path}','${rootPath}',event)"
                         style="position:relative;">
                        <i class="fas ${icon}"></i>
                        <span>${f.name}</span>
                        <span class="folder-item-actions">
                            <i class="fas fa-trash" title="Delete" onclick="event.stopPropagation();deleteFolderItem('${fullPath}','${wid}','${path}','${rootPath}')" style="color:#ef4444;cursor:pointer;font-size:0.7rem;padding:3px 5px;border-radius:4px;"></i>
                        </span>
                    </div>`;
                }).join('');
                if (!html) html = '<div style="grid-column:1/-1;text-align:center;color:#6b7280;padding:20px;">Folder is empty</div>';
                grid.innerHTML = html;
                // Attach drag events (overwrites previous listeners via new grid reference after innerHTML)
                attachGridDragDrop(grid, () => path, () => window.renderFolderInWindow(wid, path, rootPath));
            };

            createWindow(winId, `📁 ${folderName}`, `
                <div id="fbread-${winId}" style="display:none;font-size:0.75rem;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08);color:#818cf8;"></div>
                <div class="file-grid" id="fgrid-${winId}">
                    <div style="grid-column:1/-1;text-align:center;color:#6b7280;padding:20px;">Loading...</div>
                </div>
            `, 550, 400);

            await window.renderFolderInWindow(winId, folderPath, folderPath);
        }

        function selectFolderItem(el) {
            const grid = el.closest('.file-grid');
            if (grid) grid.querySelectorAll('.file-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
        }

        /* ══════════════════════════════════════════
           Drag & Drop — event delegation on grids
           ══════════════════════════════════════════ */
        let _draggedFile = null; // { path, name, refreshSource }

        async function _doDrop(destPath, refreshDest) {
            if (!_draggedFile) return;
            const src  = _draggedFile.path;
            const dest = destPath ? `${destPath}/${_draggedFile.name}` : _draggedFile.name;
            const refreshSrc = _draggedFile.refreshSource;
            _draggedFile = null;

            if (src === dest || dest.startsWith(src + '/')) return;

            const username = currentUser?.username || 'guest';
            try {
                const res = await fetch(`${API}/files/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json',
                               'Authorization': `Bearer ${localStorage.getItem('auth_token') || ''}` },
                    body: JSON.stringify({ username, old_name: src, new_name: dest })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`Moved to ${destPath ? destPath.split('/').pop() : 'root'}`, 'success');
                    if (refreshSrc) refreshSrc();
                    if (refreshDest) refreshDest();
                    loadFiles(currentPath); // always sync main grid
                } else {
                    showToast(data.error || 'Move failed', 'error');
                }
            } catch (e) { showToast('Move failed', 'error'); }
        }

        /* Attach drag-and-drop events to any .file-grid element.
           curDirPath  = the folder this grid is currently showing
           refreshFn   = called after a successful drop that affects this grid */
        function attachGridDragDrop(gridEl, getCurDirPath, refreshFn) {
            // dragstart — item inside this grid starts being dragged
            gridEl.addEventListener('dragstart', (e) => {
                const item = e.target.closest('[data-dnd-path]');
                if (!item) return;
                _draggedFile = {
                    path: item.dataset.dndPath,
                    name: item.dataset.dndName,
                    refreshSource: refreshFn
                };
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', item.dataset.dndPath);
                item.classList.add('dragging');
                e.stopPropagation();
            });

            // dragend — clean up classes
            gridEl.addEventListener('dragend', () => {
                document.querySelectorAll('.dragging, .drag-over').forEach(el => {
                    el.classList.remove('dragging', 'drag-over');
                });
            });

            // dragover — highlight folder targets and allow drop on empty space
            gridEl.addEventListener('dragover', (e) => {
                if (!_draggedFile) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                // Highlight only folder items
                const folder = e.target.closest('[data-dnd-isdir="true"]');
                gridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                if (folder && folder.dataset.dndPath !== _draggedFile?.path) {
                    folder.classList.add('drag-over');
                }
            });

            // dragleave — clear highlights when leaving grid
            gridEl.addEventListener('dragleave', (e) => {
                if (!gridEl.contains(e.relatedTarget)) {
                    gridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                }
            });

            // drop — onto a folder icon OR onto empty grid space
            gridEl.addEventListener('drop', (e) => {
                e.preventDefault();
                const folder = e.target.closest('[data-dnd-isdir="true"]');
                gridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                if (folder && folder.dataset.dndPath !== _draggedFile?.path) {
                    _doDrop(folder.dataset.dndPath, refreshFn);
                } else if (!folder) {
                    // Drop on empty grid space → move to this grid's current directory
                    _doDrop(getCurDirPath(), refreshFn);
                }
            });
        }

        async function deleteFolderItem(fullPath, wid, currentPath, rootPath) {
            if (!confirm(`Delete: ${fullPath.split('/').pop()}?`)) return;
            const username = currentUser?.username || 'guest';
            try {
                const res = await fetch(`${API}/files/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, names: [fullPath] })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Deleted', 'success');
                    window.renderFolderInWindow(wid, currentPath, rootPath);
                    loadFiles();
                } else {
                    showToast(data.error || 'Could not delete', 'error');
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        }

        async function downloadOrViewFile(name, ext) {
            const username = currentUser?.username || 'guest';
            const encodedName = name.split('/').map(encodeURIComponent).join('/');
            const token = localStorage.getItem('auth_token') || '';
            // view endpoint accepts ?token= (needed for <video>/<audio> which can't send headers)
            const mediaExts = ['mp4','webm','mov','mkv','avi','m4v','ogg','mp3','wav','flac','m4a'];
            const url = mediaExts.includes(ext)
                ? `${API}/files/view/${username}/${encodedName}?token=${token}`
                : `${API}/files/download/${username}/${encodedName}`;
            const shortName = name.split('/').pop();

            if (ext === 'pdf') {
                window.open(url, '_blank');
            } else if (['png','jpg','jpeg','gif','bmp','webp'].includes(ext)) {
                const viewerId = `viewer-${name.replace(/[^a-z0-9]/gi, '-')}`;
                createWindow(viewerId, `🖼️ ${shortName}`, `
                    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;padding:10px;">
                        <img src="${url}" style="max-width:100%;max-height:calc(100% - 50px);object-fit:contain;border-radius:8px;" />
                        <div style="margin-top:10px;">
                            <a href="${url}" download="${shortName}" style="color:#818cf8;text-decoration:none;">⬇️ Download</a>
                        </div>
                    </div>
                `, 700, 500);
            } else if (['mp4','webm','mov','mkv','avi','m4v','ogg'].includes(ext)) {
                // HTML5 Video Player
                const mimeMap = { mp4:'video/mp4', webm:'video/webm', ogg:'video/ogg', mov:'video/mp4', mkv:'video/x-matroska', avi:'video/x-msvideo', m4v:'video/mp4' };
                const mime = mimeMap[ext] || 'video/mp4';
                const playerId = `player-${name.replace(/[^a-z0-9]/gi, '-')}`;
                const existing = document.getElementById(`window-${playerId}`);
                if (existing) { existing.style.zIndex = ++windowZIndex; existing.classList.remove('minimized'); return; }
                createWindow(playerId, `▶ ${shortName}`, `
                    <div class="video-player-wrap">
                        <video controls autoplay preload="metadata" style="flex:1;width:100%;min-height:0;background:#000;">
                            <source src="${url}" type="${mime}">
                            <p style="color:#9ca3af;text-align:center;padding:20px;">Your browser does not support this video format.</p>
                        </video>
                        <div class="video-player-bar">
                            <a href="${url}" download="${shortName}"><i class="fas fa-download"></i> Download</a>
                            <a href="${url}" target="_blank"><i class="fas fa-external-link-alt"></i> Open in tab</a>
                            <span>${shortName}</span>
                        </div>
                    </div>
                `, 800, 500);
            } else if (['mp3','wav','flac','m4a'].includes(ext)) {
                // Audio Player
                const audioId = `audio-${name.replace(/[^a-z0-9]/gi, '-')}`;
                const existing = document.getElementById(`window-${audioId}`);
                if (existing) { existing.style.zIndex = ++windowZIndex; existing.classList.remove('minimized'); return; }
                createWindow(audioId, `🎵 ${shortName}`, `
                    <div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;background:#0a0a0f;">
                        <i class="fas fa-music" style="font-size:3rem;color:#818cf8;"></i>
                        <div style="color:#e5e7eb;font-size:0.9rem;">${shortName}</div>
                        <audio controls autoplay style="width:100%;max-width:400px;">
                            <source src="${url}">
                        </audio>
                        <a href="${url}" download="${shortName}" style="color:#818cf8;font-size:0.8rem;text-decoration:none;"><i class="fas fa-download"></i> Download</a>
                    </div>
                `, 460, 240);
            } else {
                const a = document.createElement('a');
                a.href = url;
                a.download = shortName;
                a.click();
            }
        }
        
        // ── Desktop Widget System ────────────────────────────────────────────
        const WIDGETS_KEY = 'puterra_widgets';

        function saveWidgets() {
            const layer = document.getElementById('widgetLayer');
            if (!layer) return;
            const state = [];
            layer.querySelectorAll('.desktop-widget').forEach(w => {
                state.push({
                    id:       w.dataset.wid,
                    filePath: w.dataset.filepath,
                    x:        parseInt(w.style.left)  || 60,
                    y:        parseInt(w.style.top)   || 60,
                    width:    parseInt(w.style.width)  || 320,
                    height:   parseInt(w.style.height) || 240,
                });
            });
            localStorage.setItem(WIDGETS_KEY, JSON.stringify(state));
        }

        function loadSavedWidgets() {
            try {
                const saved = JSON.parse(localStorage.getItem(WIDGETS_KEY) || '[]');
                saved.forEach(w => createDesktopWidget(w.filePath, w.x, w.y, w.width, w.height, w.id));
            } catch(e) {}
        }

        function createDesktopWidget(filePath, x, y, w, h, existingId) {
            const layer = document.getElementById('widgetLayer');
            if (!layer) return;

            const id       = existingId || ('w' + Date.now());
            const username = currentUser?.username || 'guest';
            const token    = localStorage.getItem('auth_token') || '';
            const title    = filePath.split('/').pop();
            const pathParts = filePath.split('/').map(encodeURIComponent).join('/');
            const src = `/api/files/view/${username}/${pathParts}?token=${token}`;

            // Default position: slightly offset from top-left
            x = x ?? (60 + Math.random() * 80 | 0);
            y = y ?? (60 + Math.random() * 60 | 0);
            w = w || 320;
            h = h || 240;

            const div = document.createElement('div');
            div.className   = 'desktop-widget';
            div.id          = `dw-${id}`;
            div.dataset.wid = id;
            div.dataset.filepath = filePath;
            div.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;

            div.innerHTML = `
                <div class="widget-handle" id="wh-${id}">
                    <span class="wh-title">📌 ${title}</span>
                    <button class="wh-btn" title="Reload"
                        onclick="document.getElementById('wf-${id}').src=document.getElementById('wf-${id}').src">
                        <i class="fas fa-redo-alt"></i>
                    </button>
                    <button class="wh-btn" title="Open in viewer"
                        onclick="openHtmlViewer('${filePath}')">
                        <i class="fas fa-expand-alt"></i>
                    </button>
                    <button class="wh-btn close" title="Remove widget"
                        onclick="removeWidget('${id}')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <iframe id="wf-${id}" class="widget-iframe"
                    src="${src}"
                    sandbox="allow-scripts allow-forms allow-modals allow-popups"
                    allow="camera; microphone">
                </iframe>
                <div class="widget-resize" id="wr-${id}"></div>`;

            layer.appendChild(div);
            makeWidgetDraggable(div, document.getElementById(`wh-${id}`));
            makeWidgetResizable(div, document.getElementById(`wr-${id}`));

            // Focus on click
            div.addEventListener('mousedown', () => {
                layer.querySelectorAll('.desktop-widget').forEach(w => w.classList.remove('widget-focused'));
                div.classList.add('widget-focused');
            });

            saveWidgets();
            return div;
        }

        function removeWidget(id) {
            const el = document.getElementById(`dw-${id}`);
            if (el) el.remove();
            saveWidgets();
        }

        function makeWidgetDraggable(widget, handle) {
            let ox, oy, startX, startY, dragging = false;
            handle.addEventListener('mousedown', e => {
                if (e.target.closest('button')) return;
                dragging = true;
                startX = e.clientX; startY = e.clientY;
                ox = parseInt(widget.style.left) || 0;
                oy = parseInt(widget.style.top)  || 0;
                e.preventDefault();
            });
            document.addEventListener('mousemove', e => {
                if (!dragging) return;
                widget.style.left = Math.max(0, ox + e.clientX - startX) + 'px';
                widget.style.top  = Math.max(0, oy + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (dragging) { dragging = false; saveWidgets(); }
            });
            // Touch
            handle.addEventListener('touchstart', e => {
                if (e.target.closest('button')) return;
                dragging = true;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                ox = parseInt(widget.style.left) || 0;
                oy = parseInt(widget.style.top)  || 0;
            }, {passive: true});
            document.addEventListener('touchmove', e => {
                if (!dragging) return;
                widget.style.left = Math.max(0, ox + e.touches[0].clientX - startX) + 'px';
                widget.style.top  = Math.max(0, oy + e.touches[0].clientY - startY) + 'px';
            }, {passive: true});
            document.addEventListener('touchend', () => {
                if (dragging) { dragging = false; saveWidgets(); }
            });
        }

        function makeWidgetResizable(widget, handle) {
            let startX, startY, startW, startH, resizing = false;
            handle.addEventListener('mousedown', e => {
                resizing = true;
                startX = e.clientX; startY = e.clientY;
                startW = widget.offsetWidth;
                startH = widget.offsetHeight;
                e.preventDefault(); e.stopPropagation();
            });
            document.addEventListener('mousemove', e => {
                if (!resizing) return;
                widget.style.width  = Math.max(160, startW + e.clientX - startX) + 'px';
                widget.style.height = Math.max(100, startH + e.clientY - startY) + 'px';
            });
            document.addEventListener('mouseup', () => {
                if (resizing) { resizing = false; saveWidgets(); }
            });
        }

        function setupEditorLineNumbers(editorId) {
            const ta = document.getElementById(`file-content-${editorId}`);
            const ln = document.getElementById(`lnum-${editorId}`);
            if (!ta || !ln) return;

            function updateLN() {
                const count = ta.value.split('\n').length;
                ln.textContent = Array.from({length: count}, (_, i) => i + 1).join('\n');
                ln.scrollTop = ta.scrollTop;
            }

            ta.addEventListener('input', updateLN);
            ta.addEventListener('scroll', () => { ln.scrollTop = ta.scrollTop; });
            ta.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const s = ta.selectionStart, en = ta.selectionEnd;
                    ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(en);
                    ta.selectionStart = ta.selectionEnd = s + 4;
                    updateLN();
                }
            });
            updateLN();
        }

        async function runEditorFile(name, editorId, lang) {
            // Auto-save before running
            await saveFileContent(name, editorId);

            const ta = document.getElementById(`file-content-${editorId}`);
            const code = ta?.value || '';
            const outWrap = document.getElementById(`run-output-${editorId}`);
            const outEl = document.getElementById(`run-output-content-${editorId}`);
            const statusEl = document.getElementById(`run-status-${editorId}`);

            if (!outWrap || !outEl) return;
            outWrap.style.display = 'flex';
            outEl.innerHTML = '<span style="color:#6b7280;font-style:italic;">Running…</span>';
            if (statusEl) { statusEl.textContent = '⏳ running'; statusEl.style.color = '#a78bfa'; }

            const start = performance.now();
            const username = currentUser?.username || 'guest';

            try {
                const res = await fetch(`${API}/run`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: lang, code, username })
                });
                const d = await res.json();
                const elapsed = ((performance.now() - start) / 1000).toFixed(2);

                let html = '';
                if (d.stdout) html += `<span style="color:#e2e8f0;">${escapeHtml(d.stdout.trimEnd())}</span>`;
                if (d.stdout && d.stderr) html += '\n';
                if (d.stderr) html += parseRunError(d.stderr, editorId);
                if (d.error)  html += `<span style="color:#f87171;">⚠ ${escapeHtml(d.error)}</span>`;
                if (d.hint)   html += `\n<span style="color:#60a5fa;font-style:italic;">${escapeHtml(d.hint)}</span>`;
                if (!html)    html = '<span style="color:#4b5563;">(no output)</span>';

                const exitCode = d.code;
                const success = d.success !== false && (exitCode === null || exitCode === 0);

                if (exitCode !== null && exitCode !== undefined && exitCode !== 0)
                    html += `\n<span style="color:#ef4444;font-size:0.7rem;">exit code ${exitCode}</span>`;

                outEl.innerHTML = html;
                outEl.scrollTop = 0;

                if (statusEl) {
                    statusEl.textContent = success ? `✅ ${elapsed}s` : `❌ ${elapsed}s`;
                    statusEl.style.color = success ? '#22c55e' : '#ef4444';
                }
            } catch (e) {
                outEl.innerHTML = `<span style="color:#f87171;">Connection error: ${escapeHtml(e.message)}</span>`;
                if (statusEl) { statusEl.textContent = '❌ error'; statusEl.style.color = '#ef4444'; }
            }
        }

        // Parse stderr: make "line N" clickable → jumps to line in editor
        function parseRunError(stderr, editorId) {
            let escaped = escapeHtml(stderr.trimEnd());
            // Clickable line references
            escaped = escaped.replace(/line (\d+)/gi, (m, n) =>
                `<span onclick="goToEditorLine('${editorId}',${n})" style="color:#f87171;text-decoration:underline;cursor:pointer;">${m}</span>`
            );
            // Also match JS-style ":N:" patterns like "script.js:5:3"
            escaped = escaped.replace(/:(\d+):\d+/g, (m, n) =>
                `<span onclick="goToEditorLine('${editorId}',${n})" style="color:#f87171;text-decoration:underline;cursor:pointer;">${m}</span>`
            );
            return `<span style="color:#f87171;">${escaped}</span>`;
        }

        function goToEditorLine(editorId, lineNum) {
            const ta = document.getElementById(`file-content-${editorId}`);
            if (!ta) return;
            const lines = ta.value.split('\n');
            const idx = Math.max(0, lineNum - 1);
            let pos = 0;
            for (let i = 0; i < idx; i++) pos += lines[i].length + 1;
            ta.focus();
            ta.setSelectionRange(pos, pos + (lines[idx]?.length || 0));
            const lineH = ta.scrollHeight / Math.max(lines.length, 1);
            ta.scrollTop = Math.max(0, idx * lineH - ta.clientHeight / 2);
        }

        function clearEditorOutput(editorId) {
            const outWrap = document.getElementById(`run-output-${editorId}`);
            const outEl = document.getElementById(`run-output-content-${editorId}`);
            const statusEl = document.getElementById(`run-status-${editorId}`);
            if (outWrap) outWrap.style.display = 'none';
            if (outEl) outEl.innerHTML = '';
            if (statusEl) { statusEl.textContent = ''; }
        }

                showToast('Connection error', 'error');

        }

        function setFolderContext(fullPath, name, isDir, wid, curPath, rootPath, event) {
            folderContext = { fullPath, name, isDir, wid, curPath, rootPath };

            const renameMenuItem = document.getElementById('renameMenuItem');

        // Rename selected item
        async function renameSelected() {
            const ctx = folderContext;  // Save before hideContextMenu clears it
            hideContextMenu();
            if (ctx) {
                const newName = prompt('New name:', ctx.name);
                if (!newName || newName === ctx.name) return;
                const username = currentUser?.username || 'guest';
                // Build new full path: same directory, new filename
                const parentPath = ctx.fullPath.includes('/') ? ctx.fullPath.substring(0, ctx.fullPath.lastIndexOf('/')) : '';
                const newFullPath = parentPath ? `${parentPath}/${newName}` : newName;
                try {
                    const res = await fetch(`${API}/files/rename`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, old_name: ctx.fullPath, new_name: newFullPath })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showToast('Renamed successfully', 'success');
                        window.renderFolderInWindow(ctx.wid, ctx.curPath, ctx.rootPath);

                    } else {
                        showToast(data.error || 'Rename failed', 'error');
                    }

                    showToast('Error: ' + e.message, 'error');

        // Upload file (TODO: needs backend multipart support)
        function uploadFile() {

            input.onchange = async () => {
                if (!input.files || input.files.length === 0) return;

                        method: 'POST',

                    });

                        showToast(data.error || 'Upload failed', 'error');

                    showToast('Upload failed: ' + e.message, 'error');
                }
            };

        // Download selected files
        function downloadSelected() {
            hideContextMenu();
            const username = currentUser?.username || 'guest';
            if (folderContext) {
                const ctx = folderContext;
                folderContext = null;
                if (ctx.isDir) { showToast('Folders cannot be downloaded', 'info'); return; }
                const url = `${API}/files/download/${username}/${encodeURIComponent(ctx.fullPath)}`;
                const a = document.createElement('a');
                a.href = url;
                a.download = ctx.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast(`Downloading: ${ctx.name}`, 'success');
                return;
            }
            if (selectedItems.length === 0) {
                showToast('Select files to download', 'info');
                return;
            }
            selectedItems.forEach(i => {
                const file = files[i];
                if (file.is_dir) return; // skip folders
                const fullName = currentPath ? `${currentPath}/${file.name}` : file.name;
                const url = `${API}/files/download/${username}/${encodeURIComponent(fullName)}`;
                const a = document.createElement('a');
                a.href = url;
                a.download = file.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
            showToast(`Downloading ${selectedItems.length} file(s)`, 'success');
        }

        async function deleteSelected() {

                await deleteFolderItem(ctx.fullPath, ctx.wid, ctx.curPath, ctx.rootPath);
                return;

            hideContextMenu();
            if (selectedItems.length === 0) {
                showToast('Select items to delete', 'info');
                return;

            const username = currentUser?.username || 'guest';
            const names = selectedItems.map(i => files[i].name).join(', ');
            if (!confirm(`Delete: ${names}?`)) return;

            try {
                const fullNames = selectedItems.map(i => currentPath ? `${currentPath}/${files[i].name}` : files[i].name);
                const res = await fetch(`${API}/files/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, names: fullNames })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Deleted successfully', 'success');
                    selectedItems = [];
                    loadFiles();
                } else {
                    showToast(data.error || 'Delete failed', 'error');
                }
            } catch (e) {
                showToast('Connection error', 'error');
            }
        }
        
        // Rename item
        async function renameItem(index) {
            const file = files[index];
            const newName = prompt('New name:', file.name);
            if (!newName || newName === file.name) return;
            const username = currentUser?.username || 'guest';
            
            try {
                const res = await fetch(`${API}/files/rename`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, old_name: file.name, new_name: newName })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Renamed successfully', 'success');
                    loadFiles();
                } else {
                    showToast(data.error || 'Rename failed', 'error');
                }
            } catch (e) {
                showToast('Connection error', 'error');
            }
        }
        
        // Refresh
        function refresh() {
            loadFiles();
            hideContextMenu();
            showToast('Refreshed', 'info');
        }
        
        // Enter key
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
            document.getElementById('newPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') signup();
            });
            
            // Check for saved session, require login if none
            checkSession();
            // Pre-load settings for model name etc.
            fetch(`${API}/settings`).then(r => r.json()).then(d => { if (d.success) cachedSettings = d.settings; }).catch(() => {});
        });
    </script>
</body>
</html>
