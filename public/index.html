<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Puterra - Cloud OS with AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            background-color: #0f0c29;
        }

        .desktop-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('/static/Cyprus.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }
        .desktop-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10, 8, 30, 0.52);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .desktop-icon {
            width: 80px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease;
            text-align: center;
            user-select: none;
        }
        
        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .desktop-icon.selected {
            background: rgba(99, 102, 241, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.5);
        }
        
        .desktop-icon i {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: block;
        }
        
        .desktop-icon span {
            font-size: 0.7rem;
            display: block;
            word-break: break-word;
            line-height: 1.2;
        }
        
        .window {
            position: absolute;
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 300px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: hidden;
        }
        
        .window-resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
            border-radius: 0 0 12px 0;
        }
        
        .window.minimized { display: none; }
        
        .window-header {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(139, 92, 246, 0.2) 100%);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: move;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px 12px 0 0;
        }
        
        .window-title {
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .window-controls { display: flex; gap: 8px; }
        
        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        
        .window-btn:hover { transform: scale(1.2); }
        .window-btn.close { background: #ef4444; }
        .window-btn.minimize { background: #f59e0b; }
        .window-btn.maximize { background: #22c55e; }
        
        .window-content {
            padding: 16px;
            overflow: auto;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        
        .window-content > * {
            flex: 1;
            min-height: 0;
        }
        
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 0 16px;
            z-index: 1000;
        }
        
        .taskbar-item {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            color: white;
        }
        
        .taskbar-item:hover { background: rgba(255, 255, 255, 0.1); }
        .taskbar-item.active { background: rgba(99, 102, 241, 0.3); border-bottom: 2px solid #6366f1; }
        
        .context-menu {
            position: fixed;
            background: rgba(30, 30, 40, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 160px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .context-menu-item {
            padding: 8px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            transition: background 0.15s;
        }
        
        .context-menu-item:hover { background: rgba(99, 102, 241, 0.2); }
        
        .toast {
            position: fixed;
            bottom: 70px;
            right: 20px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast.success { background: rgba(34, 197, 94, 0.95); }
        .toast.error { background: rgba(239, 68, 68, 0.95); }
        .toast.info { background: rgba(99, 102, 241, 0.95); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .fade-in { animation: fadeIn 0.2s ease; }
        
        /* AI Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 200px;
        }
        
        .chat-layout {
            display: flex;
            height: 100%;
            overflow: hidden;
        }
        .chat-sidebar {
            width: 200px;
            min-width: 200px;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }
        .chat-sidebar-header {
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .chat-sidebar-header button {
            width: 100%;
            padding: 8px 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .chat-sidebar-header button:hover { opacity: 0.9; }
        .chat-sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
        }
        .chat-sidebar-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
            position: relative;
        }
        .chat-sidebar-item:hover { background: rgba(255,255,255,0.08); color: #e5e7eb; }
        .chat-sidebar-item.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }
        .chat-sidebar-item .conv-title { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .chat-sidebar-item .conv-delete {
            opacity: 0;
            color: #ef4444;
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .chat-sidebar-item:hover .conv-delete { opacity: 0.7; }
        .chat-sidebar-item .conv-delete:hover { opacity: 1; background: rgba(239,68,68,0.2); }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-message {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .chat-message.user {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            align-self: flex-end;
        }
        
        .chat-message.assistant {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
        }
        
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            outline: none;
            font-family: inherit;
            min-width: 0;
            resize: none;
            min-height: 40px;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.4;
            display: block;
        }
        
        .chat-send {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .chat-send:hover { opacity: 0.9; }

        /* Agent Steps */
        .agent-steps {
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            font-size: 0.8rem;
        }

        .agent-steps-header {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a5b4fc;
            font-weight: 500;
            user-select: none;
        }

        .agent-steps-header:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .agent-steps-body {
            display: none;
            padding: 0 12px 10px;
        }

        .agent-steps-body.open {
            display: block;
        }

        .agent-step {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .agent-step:last-child {
            border-bottom: none;
        }

        .agent-step-thought {
            color: #94a3b8;
            font-style: italic;
            margin-bottom: 4px;
        }

        .agent-step-action {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fbbf24;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
        }

        .agent-step-observation {
            color: #86efac;
            font-size: 0.75rem;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 4px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .agent-step-thinking {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 0;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .agent-step-thinking:hover {
            background: rgba(167, 139, 250, 0.05);
            border-radius: 4px;
            padding: 6px 8px;
        }

        .agent-step-obs-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            cursor: pointer;
            color: #6b7280;
            font-size: 0.75rem;
            transition: background 0.2s ease;
        }

        .agent-step-obs-toggle:hover {
            background: rgba(107, 114, 128, 0.05);
            border-radius: 4px;
            padding: 4px 8px;
        }

        .agent-steps-live {
            background: rgba(99, 102, 241, 0.06);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .folder-win-item .folder-item-actions { display:none; position:absolute; top:2px; right:2px; }
        .folder-win-item:hover .folder-item-actions { display:flex; gap:2px; }
        .folder-win-item:hover { background: rgba(99,102,241,0.15); }

        .think-block {
            margin: 3px 0;
            border-radius: 6px;
            overflow: hidden;
        }
        .think-block summary {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 6px;
            color: #c4b5fd;
            font-size: 0.8rem;
            list-style: none;
            user-select: none;
            border-radius: 6px;
        }
        .think-block summary:hover { background: rgba(167,139,250,0.08); }
        .think-block summary::-webkit-details-marker { display: none; }
        .think-block summary .think-caret { transition: transform 0.2s; font-size: 0.65rem; color: #a78bfa; }
        .think-block[open] summary .think-caret { transform: rotate(90deg); }
        .think-block .think-body {
            margin: 4px 0 4px 20px;
            color: #ddd6fe;
            font-size: 0.78rem;
            background: rgba(167,139,250,0.08);
            padding: 8px 10px;
            border-radius: 6px;
            white-space: pre-wrap;
            line-height: 1.5;
            border-left: 2px solid #a78bfa;
            word-break: break-word;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-size: 0.8rem;
            color: #a5b4fc;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .agent-status .pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Code Editor */
        .code-editor-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 0;
        }

        .code-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .code-tab {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }

        .code-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .code-tab.active { color: #a5b4fc; border-bottom-color: #6366f1; background: rgba(99,102,241,0.1); }

        .code-tab.python { color: #fbbf24; }
        .code-tab.python.active { color: #fbbf24; border-bottom-color: #f59e0b; }
        .code-tab.javascript { color: #facc15; }
        .code-tab.javascript.active { color: #facc15; border-bottom-color: #eab308; }
        .code-tab.wasm { color: #818cf8; }
        .code-tab.wasm.active { color: #818cf8; border-bottom-color: #6366f1; }

        .code-toolbar {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .code-toolbar button {
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            color: #d1d5db;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .code-toolbar button:hover { background: rgba(255,255,255,0.08); }
        .code-toolbar .run-btn { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #86efac; }
        .code-toolbar .run-btn:hover { background: rgba(34,197,94,0.25); }

        .code-input {
            flex: 1;
            min-height: 120px;
            background: #0d0d12;
            border: none;
            padding: 12px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        .code-output-panel {
            flex-shrink: 0;
            max-height: 200px;
            min-height: 60px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .code-output-header {
            padding: 6px 10px;
            font-size: 0.7rem;
            color: #6b7280;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .code-output {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #a3e635;
            background: #0a0a0f;
        }

        .code-output .error { color: #f87171; }
        .code-output .info { color: #60a5fa; }
        .code-output .system { color: #6b7280; font-style: italic; }

        .code-status {
            padding: 4px 10px;
            font-size: 0.7rem;
            color: #6b7280;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }

        /* Desktop Widgets */
        #widgetLayer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: calc(100vh - 50px);
            pointer-events: none;
            z-index: 5;
        }
        .desktop-widget {
            position: absolute;
            pointer-events: all;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            background: rgba(15,12,40,0.6);
            backdrop-filter: blur(16px);
            min-width: 160px;
            min-height: 100px;
        }
        .desktop-widget.widget-focused {
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.5);
        }
        .widget-handle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            background: rgba(0,0,0,0.3);
            cursor: grab;
            user-select: none;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .widget-handle:active { cursor: grabbing; }
        .widget-handle .wh-title {
            flex: 1;
            font-size: 0.7rem;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .widget-handle .wh-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 2px 5px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
        }
        .widget-handle .wh-btn:hover { color: #e5e7eb; background: rgba(255,255,255,0.1); }
        .widget-handle .wh-btn.close:hover { color: #ef4444; }
        .widget-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
            display: block;
        }
        .widget-resize {
            position: absolute;
            right: 0; bottom: 0;
            width: 16px; height: 16px;
            cursor: nwse-resize;
            opacity: 0.4;
        }
        .widget-resize::after {
            content: '';
            position: absolute;
            right: 3px; bottom: 3px;
            width: 8px; height: 8px;
            border-right: 2px solid #6b7280;
            border-bottom: 2px solid #6b7280;
            border-radius: 1px;
        }

        /* HTML Viewer */
        .html-viewer-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .html-viewer-toolbar .hv-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 4px 9px;
            color: #d1d5db;
            cursor: pointer;
            font-size: 0.78rem;
            transition: background 0.15s;
            white-space: nowrap;
        }

                <i class="fas fa-thumbtack"></i>
                <span>Pin as Widget</span>
            </div>
            <div class="context-menu-divider" id="pinWidgetDivider" style="height:1px;background:rgba(255,255,255,0.1);margin:4px 0;display:none;"></div>
            <div class="context-menu-item" onclick="refresh()">

    <script>
        console.error('[PUTERRA] index.html loaded at', new Date().toISOString());
        const API = '/api';
        let currentUser = null;
        let files = [];
        let selectedItems = [];
        let openWindows = {};
        let windowZIndex = 100;
        let chatHistory = [];
        let cachedSettings = null;
        let conversations = []; // [{id, title, messages, html, created}]
        let activeConversationId = null;
        let agentAbortController = null;
        
        // Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Show/hide forms
        function showSignup() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }
        
        // Login
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Please fill all fields');
                return;
            }
            
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    // Store token for session persistence
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    currentUser = data.user;
                    showDesktop();
                    showToast(`Welcome, ${data.user.username}!`, 'success');
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (e) {
                showError('Connection error');
            }
        }
        
        // Signup
        async function signup() {
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value;
            
            if (!username || !password) {
                showError('Please fill all fields');
                return;
            }
            
            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            try {
                const res = await fetch(`${API}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    showLogin();
                    showSuccess('Account created! Please login.');
                } else {
                    showError(data.error || 'Signup failed');
                }
            } catch (e) {
                showError('Connection error');
            }
        }
        
        // Logout
        async function logout() {
            const token = localStorage.getItem('auth_token');
            try {
                await fetch(`${API}/logout`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
            } catch (e) {
                // Ignore errors on logout
            }
            localStorage.removeItem('user');
            localStorage.removeItem('auth_token');
            currentUser = null;
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('desktopScreen').classList.add('hidden');
        }
        
        // Show desktop
        function showDesktop() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('desktopScreen').classList.remove('hidden');
            document.getElementById('userDisplay').textContent = currentUser?.username || 'Guest';
            loadFiles();
            // Restore pinned widgets after a short delay (token must be ready)
            setTimeout(loadSavedWidgets, 300);
        }
        
        // Check session on load - require login
        function checkSession() {
            const savedUser = localStorage.getItem('user');
            const token = localStorage.getItem('auth_token');

            if (savedUser && token) {
                // Validate token with server
                fetch(`${API}/validate-token`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(r => r.json()).then(data => {
                    if (data.valid) {
                        currentUser = JSON.parse(savedUser);
                        showDesktop();
                        restoreChatHistory();
                    } else {
                        // Token invalid, clear session
                        localStorage.removeItem('user');
                        localStorage.removeItem('auth_token');
                    }
                }).catch(() => {
                    // Network error - still show login
                    localStorage.removeItem('user');
                    localStorage.removeItem('auth_token');
                });
            }
            // If no saved user/token, stay on login screen
        }
        
        // ============ CONVERSATION MANAGEMENT ============

        const WELCOME_HTML = `<div class="chat-message assistant">
            🤖 <b>Puterra AI Agent</b><br><br>
            I'm an <b>agentic AI</b> - you can ask questions, perform file operations, search the web, and much more.<br><br>
            <b>🔧 My Tools:</b> Web Search, URL Fetch, File Read/Write, Shell, Memory, PDF Create<br>
            <b>💡 Examples:</b> "What's the weather today?", "Create notes.txt", "Write fibonacci in Python"
        </div>`;

        function loadConversations() {
            try {
                const saved = localStorage.getItem('puterra_conversations');
                conversations = saved ? JSON.parse(saved) : [];
            } catch (e) {
                conversations = [];
            }
            // Migrate old single-chat format
            if (conversations.length === 0) {
                const oldHistory = localStorage.getItem('puterra_chat_history');
                const oldHtml = localStorage.getItem('puterra_chat_html');
                if (oldHistory || oldHtml) {
                    const conv = {
                        id: Date.now().toString(),
                        title: 'Previous Chat',
                        messages: oldHistory ? JSON.parse(oldHistory) : [],
                        html: oldHtml || WELCOME_HTML,
                        created: Date.now()
                    };
                    conversations.push(conv);
                    saveConversations();
                    localStorage.removeItem('puterra_chat_history');
                    localStorage.removeItem('puterra_chat_html');
                }
            }
            renderConversationList();
        }

        function saveConversations() {
            localStorage.setItem('puterra_conversations', JSON.stringify(conversations));
            if (activeConversationId) {
                localStorage.setItem('puterra_active_conversation', activeConversationId);
            }
        }

        /* ── Mobile: toggle the conversation sidebar ── */
        function toggleChatSidebar() {
            const sidebar = document.getElementById('chatSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (!sidebar) return;
            const isOpen = sidebar.classList.toggle('open');
            if (overlay) overlay.style.display = isOpen ? 'block' : 'none';
        }

        function closeChatSidebarOnMobile() {
            if (window.innerWidth > 768) return;
            const sidebar = document.getElementById('chatSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar) sidebar.classList.remove('open');
            if (overlay) overlay.style.display = 'none';
        }

        function newConversation() {
            // Save current conversation first
            saveActiveConversation();

            const conv = {
                id: Date.now().toString(),
                title: 'New Chat',
                messages: [],
                html: WELCOME_HTML,
                created: Date.now()
            };
            conversations.unshift(conv);
            activeConversationId = conv.id;
            chatHistory = [];
            saveConversations();
            renderConversationList();

            const messagesDiv = document.getElementById('chatMessages');
            if (messagesDiv) {
                messagesDiv.innerHTML = WELCOME_HTML;
            }
            closeChatSidebarOnMobile();
        }

        function switchConversation(id) {
            if (id === activeConversationId) {
                closeChatSidebarOnMobile();
                return;
            }
            // Save current
            saveActiveConversation();
            // Load target
            activeConversationId = id;
            const conv = conversations.find(c => c.id === id);
            if (conv) {
                chatHistory = conv.messages ? [...conv.messages] : [];
                const messagesDiv = document.getElementById('chatMessages');
                if (messagesDiv) {
                    messagesDiv.innerHTML = conv.html || WELCOME_HTML;
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            }
            renderConversationList();
            closeChatSidebarOnMobile();
        }

        async function deleteConversation(id, event) {
            event.stopPropagation();
            if (!confirm('Are you sure you want to delete this conversation?')) return;
            conversations = conversations.filter(c => c.id !== id);
            saveConversations();
            if (id === activeConversationId) {
                if (conversations.length > 0) {
                    switchConversation(conversations[0].id);
                } else {
                    newConversation();
                }
            }
            renderConversationList();
            // Delete associated task folders (tasks/CONV_ID-*)
            try {
                const token = localStorage.getItem('auth_token') || '';
                const res = await fetch(`${API}/files/list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, path: 'tasks' })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.files)) {
                    const matching = data.files.filter(f => f.is_dir && f.name.startsWith(id + '-'));
                    for (const f of matching) {
                        await fetch(`${API}/files/delete`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token, names: [`tasks/${f.name}`] })
                        });
                    }
                    if (matching.length > 0) showToast(`Deleted ${matching.length} task folder(s)`, 'info');
                }
            } catch (_) {}
        }

        function saveActiveConversation() {
            if (!activeConversationId) return;
            const conv = conversations.find(c => c.id === activeConversationId);
            if (conv) {
                conv.messages = [...chatHistory];
                const messagesDiv = document.getElementById('chatMessages');
                if (messagesDiv) {
                    conv.html = messagesDiv.innerHTML;
                }
            }
            saveConversations();
        }

        function updateConversationTitle(text) {
            const conv = conversations.find(c => c.id === activeConversationId);
            if (conv && conv.title === 'New Chat') {
                conv.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                saveConversations();
                renderConversationList();
            }

        function renderConversationList() {
            const list = document.getElementById('conversationList');
            if (!list) return;

            if (conversations.length === 0) {

            list.innerHTML = conversations.map(c => {
                const isActive = c.id === activeConversationId;
                const date = new Date(c.created);
                const dateStr = date.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
                const msgCount = c.messages ? c.messages.length : 0;
                return `<div class="chat-sidebar-item ${isActive ? 'active' : ''}" onclick="switchConversation('${c.id}')">

        // Save chat to history (backwards compatible wrapper)
        function saveChatHistory() {
            saveActiveConversation();
        }

        // Restore chat history (called on page load / session restore)
        function restoreChatHistory() {
            // Just load conversations from localStorage, don't touch DOM yet
            // (AI Chat window may not be open yet - DOM restoration happens in openApp)
            try {
                const saved = localStorage.getItem('puterra_conversations');
                conversations = saved ? JSON.parse(saved) : [];
            } catch (e) {
                conversations = [];
            }
            // Restore active conversation ID
            const savedActiveId = localStorage.getItem('puterra_active_conversation');
            if (savedActiveId && conversations.find(c => c.id === savedActiveId)) {
                activeConversationId = savedActiveId;
                const conv = conversations.find(c => c.id === savedActiveId);
                chatHistory = conv.messages ? [...conv.messages] : [];
            } else if (conversations.length > 0) {
                activeConversationId = conversations[0].id;
                chatHistory = conversations[0].messages ? [...conversations[0].messages] : [];
            }
        }

        function clearChatHistory() {
            if (!confirm('Are you sure you want to clear chat history?')) return;
            chatHistory = [];
            const messagesDiv = document.getElementById('chatMessages');
            if (messagesDiv) {
                messagesDiv.innerHTML = WELCOME_HTML;
            }
            // Update active conversation
            const conv = conversations.find(c => c.id === activeConversationId);
            if (conv) {
                conv.messages = [];

        async function loadFiles(path) {

                breadcrumb += ` <span style="color:#6b7280;">›</span> <span onclick="loadFiles('${partPath}')" style="cursor:pointer;color:#818cf8;">${part}</span>`;

        // Get file icon
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                'pdf': 'fa-file-pdf text-red-400',
                'doc': 'fa-file-word text-blue-400',
                'docx': 'fa-file-word text-blue-400',
                'js': 'fa-file-code text-yellow-400',
                'py': 'fa-file-code text-blue-400',
                'rs': 'fa-file-code text-orange-400',
                'html': 'fa-file-code text-orange-400',
                'css': 'fa-file-code text-blue-400',
                'json': 'fa-file-code text-yellow-400',
                'txt': 'fa-file-alt text-gray-400',
                'md': 'fa-file-alt text-gray-400',
                'jpg': 'fa-file-image text-purple-400',
                'jpeg': 'fa-file-image text-purple-400',
                'png': 'fa-file-image text-purple-400',
                'gif': 'fa-file-image text-purple-400',
                'mp3': 'fa-file-audio text-pink-400',
                'mp4': 'fa-file-video text-red-400',
                'zip': 'fa-file-archive text-yellow-400',
            };
            return icons[ext] || 'fa-file text-gray-400';
        }

        // Convert markdown to HTML (with proper line breaks)
        function markdownToHtml(text) {
            // First escape HTML for safety
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            
            // Split by lines
            const lines = html.split('\n');
            let result = [];
            
            for (let line of lines) {
                // Headers
                if (line.startsWith('### ')) {
                    result.push('<h4 style="margin:10px 0 4px;font-weight:600;">' + line.slice(4) + '</h4>');
                } else if (line.startsWith('## ')) {
                    result.push('<h3 style="margin:12px 0 6px;font-weight:600;">' + line.slice(3) + '</h3>');
                } else if (line.startsWith('# ')) {
                    result.push('<h2 style="margin:14px 0 8px;font-weight:600;font-size:1.1em;">' + line.slice(2) + '</h2>');
                } else if (line === '---') {
                    result.push('<hr style="border:none;border-top:1px solid rgba(255,255,255,0.2);margin:12px 0;">');
                } else if (line.startsWith('- ')) {
                    result.push('<div style="margin-left:12px;">• ' + line.slice(2) + '</div>');
                } else {
                    // Process inline markdown
                    line = line
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\*(.*?)\*/g, '<em>$1</em>');
                    result.push(line);
                }
            }
            
            return result.join('<br>');
        }
        
        function autoResizeChatInput() {
            const el = document.getElementById('chatInput');
            if (!el) return;
            el.style.height = '40px';
            el.style.height = Math.min(el.scrollHeight, 160) + 'px';
        }

        // Chat - uses the Agent endpoint with ReAct loop
        function setChatSendBtn(mode) {
            const btn = document.getElementById('chatSendBtn');
            if (!btn) return;
            if (mode === 'stop') {
                btn.onclick = stopAgent;
                btn.title = 'Stop';
                btn.style.background = 'rgba(239,68,68,0.2)';
                btn.style.borderColor = 'rgba(239,68,68,0.4)';
                btn.innerHTML = '<i class="fas fa-stop"></i>';
            } else {
                btn.onclick = sendChat;
                btn.title = '';
                btn.style.background = '';
                btn.style.borderColor = '';
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            }
        }

        function stopAgent() {
            if (agentAbortController) {
                agentAbortController.abort();
                agentAbortController = null;
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            if (agentAbortController) return; // already running
            input.value = '';
            input.style.height = '40px';

            // Handle special commands before adding to history
            if (/^(?:new chat)$/i.test(message)) {
                newConversation();
                return;
            }
            if (/^(?:clear)$/i.test(message)) {
                clearChatHistory();
                return;
            }

            // Ensure we have an active conversation
            if (!activeConversationId) {
                newConversation();
            }

            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="chat-message user">${escapeHtml(message)}</div>`;

            // Add to active conversation's history
            chatHistory.push({ role: 'user', content: message });
            updateConversationTitle(message);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            const username = currentUser?.username || 'guest';

            // Create streaming agent steps container
            const stepsContainerId = 'agent-stream-' + Date.now();
            messagesDiv.innerHTML += `<div class="agent-steps-live" id="${stepsContainerId}" style="margin-bottom:8px;">
                <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;color:#a78bfa;font-size:0.8rem;">
                    <i class="fas fa-brain pulse"></i>
                    <span id="${stepsContainerId}-status">Agent thinking...</span>
                </div>
                <div id="${stepsContainerId}-steps" class="open" style="padding:0 12px 4px;"></div>
            </div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            agentAbortController = new AbortController();
            setChatSendBtn('stop');
            try {
                const res = await fetch(`${API}/agent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    signal: agentAbortController.signal,
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory.slice(-(cachedSettings?.chat_context_limit || 10)),
                        model: cachedSettings?.llm_model || undefined,
                        username: username,
                        share_key: cachedShareKey?.id || undefined,
                        conv_id: activeConversationId || undefined,
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let finalAnswer = '';
                let stepsArea = document.getElementById(stepsContainerId + '-steps');
                let statusEl = document.getElementById(stepsContainerId + '-status');
                let thinkCount = 0;
                let toolCount = 0;

                const toolIcons = {
                    'web_search': 'fa-search', 'web_fetch': 'fa-globe', 'file_read': 'fa-file-alt',
                    'file_write': 'fa-save', 'file_create': 'fa-file-plus', 'file_list': 'fa-folder-open',
                    'file_delete': 'fa-trash', 'shell_exec': 'fa-terminal', 'memory_store': 'fa-database',
                    'memory_search': 'fa-search-plus', 'run_python': 'fa-code', 'run_javascript': 'fa-code',
                    'create_pdf': 'fa-file-pdf', 'image_search': 'fa-image',
                };

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (!jsonStr) continue;

                        let evt;
                        try { evt = JSON.parse(jsonStr); } catch { continue; }

                        if (evt.type === 'thinking') {
                            thinkCount++;
                            const thinkHtml = `<details class="think-block" open>
                                <summary>

                                <div class="think-body">${escapeHtml(evt.thinking)}</div>

                            stepsArea.insertAdjacentHTML('beforeend', thinkHtml);
                            if (statusEl) statusEl.textContent = `Thinking... (${thinkCount} thought(s), ${toolCount} tool(s))`;
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }

                        else if (evt.type === 'tool_call') {
                            toolCount++;
                            const icon = toolIcons[evt.action] || 'fa-cog';
                            const toolId = stepsContainerId + '-tool-' + toolCount;
                            const inputPreview = (evt.action_input || '').substring(0, 100);

                                <div class="agent-step-action" style="display:flex;align-items:center;gap:6px;color:#fbbf24;font-family:'JetBrains Mono',monospace;font-size:0.75rem;">
                                    <i class="fas fa-spinner fa-spin" id="${toolId}-spinner" style="font-size:0.65rem;color:#94a3b8;"></i>
                                    <i class="fas ${icon}"></i>
                                    <strong>${escapeHtml(evt.action)}</strong>
                                    <span style="color:#94a3b8;font-size:0.7rem;">${escapeHtml(inputPreview)}</span>
                                </div>
                            </div>`;
                            stepsArea.insertAdjacentHTML('beforeend', toolHtml);
                            if (statusEl) statusEl.textContent = `Running tool: ${evt.action} (${thinkCount} thought(s), ${toolCount} tool(s))`;
                            messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        }

                        else if (evt.type === 'tool_result') {
                            // Find the last tool div and update spinner + add observation
                            const toolEl = stepsArea.querySelector(`#${stepsContainerId}-tool-${toolCount}`);
                            if (toolEl) {
                                const spinner = toolEl.querySelector('.fa-spinner');
                                if (spinner) { spinner.className = 'fas fa-check'; spinner.style.color = '#86efac'; }
                                const obsId = stepsContainerId + '-obs-' + toolCount;
                                const obsPreview = (evt.observation || '').length > 80 ? evt.observation.substring(0, 80) + '...' : (evt.observation || '');
                                toolEl.insertAdjacentHTML('beforeend', `
                                    <div class="agent-step-obs-toggle" onclick="toggleSteps('${obsId}')" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:2px 0 2px 20px;">
                                        <i class="fas fa-caret-right" id="${obsId}-icon" style="font-size:0.6rem;width:10px;color:#6b7280;"></i>

                                    </div>
                                `);
                            }
                            if (statusEl) statusEl.textContent = `Continuing... (${thinkCount} thought(s), ${toolCount} tool(s))`;
                        }

                        else if (evt.type === 'status') {
                            if (statusEl) statusEl.textContent = evt.message;
                        }

                        else if (evt.type === 'answer') {
                            finalAnswer = evt.answer || '';
                        }

                        else if (evt.type === 'error') {
                            if (statusEl) statusEl.textContent = evt.error;
                            statusEl.style.color = '#ef4444';
                        }

                        else if (evt.type === 'done') {
                            // Update container header to final state
                            const container = document.getElementById(stepsContainerId);
                            if (container && (thinkCount > 0 || toolCount > 0)) {
                                const summary = [];
                                if (thinkCount > 0) summary.push(`${thinkCount} thought(s)`);
                                if (toolCount > 0) summary.push(`${toolCount} tool(s)`);

        function handleCodeKeydown(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const ta = e.target;
                const start = ta.selectionStart;
                const end = ta.selectionEnd;
                ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(end);
                ta.selectionStart = ta.selectionEnd = start + 4;
            }
            // Ctrl+Enter to run
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {

        function codeLog(msg, cls = '') {

        // ---- Pyodide (Browser Python) ----

        async function initPyodide() {
            if (pyodideInstance) return pyodideInstance;
            if (pyodideLoading) {
                while (pyodideLoading) await new Promise(r => setTimeout(r, 200));
                return pyodideInstance;
            }
            pyodideLoading = true;
            codeLog('Loading Python runtime (Pyodide)...', 'info');

            try {
                if (!window.loadPyodide) {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js';
                    document.head.appendChild(script);
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = () => reject(new Error('Failed to load Pyodide CDN'));
                    });
                }
                pyodideInstance = await window.loadPyodide();
                codeLog('Python runtime ready!', 'info');
            } catch (e) {
                codeLog('Failed to load Pyodide: ' + e.message, 'error');
                pyodideLoading = false;
                throw e;
            }

            pyodideLoading = false;
            return pyodideInstance;
        }

        async function runPythonBrowser(code) {
            const py = await initPyodide();

            // Redirect stdout/stderr
            py.runPython(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);
            try {
                const result = py.runPython(code);
                const stdout = py.runPython('sys.stdout.getvalue()');
                const stderr = py.runPython('sys.stderr.getvalue()');

                if (stdout) codeLog(stdout);
                if (stderr) codeLog(stderr, 'error');
                if (result !== undefined && result !== null && !stdout && !stderr) {
                    codeLog(String(result));
                }
                return { success: true };
            } catch (e) {
                codeLog(e.message, 'error');
                return { success: false };
            }
        }

        // ---- JavaScript (Browser) ----

        async function runJSBrowser(code) {
            // Create a sandboxed console
            const logs = [];
            const fakeConsole = {
                log: (...args) => { const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '); logs.push(msg); codeLog(msg); },
                error: (...args) => { const msg = args.map(a => String(a)).join(' '); logs.push(msg); codeLog(msg, 'error'); },
                warn: (...args) => { const msg = args.map(a => String(a)).join(' '); logs.push(msg); codeLog(msg, 'info'); },
                info: (...args) => fakeConsole.log(...args),
                table: (data) => fakeConsole.log(JSON.stringify(data, null, 2)),
            };

            // WASM helpers
            async function wasmFromBytes(bytes) {
                const module = await WebAssembly.compile(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
                return await WebAssembly.instantiate(module);
            }

            async function wasmFromFile(filename) {
                const username = currentUser?.username || 'guest';
                const res = await fetch(`${API}/files/read`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, name: filename })
                });
                const data = await res.json();
                if (!data.success) throw new Error('File not found: ' + filename);
                // Convert base64 or raw content to bytes
                const binary = atob(data.content);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                return wasmFromBytes(bytes);
            }

            try {
                const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
                const fn = new AsyncFunction('console', 'fetch', 'wasmFromBytes', 'wasmFromFile', code);
                const result = await fn(fakeConsole, fetch, wasmFromBytes, wasmFromFile);
                if (result !== undefined && logs.length === 0) {
                    codeLog(String(result));
                }
                return { success: true };
            } catch (e) {
                codeLog(e.message, 'error');
                return { success: false };
            }
        }

        // ---- Main Run ----

        async function runCode() {
            const code = document.getElementById('codeInput')?.value;

            clearCodeOutput();
            const startTime = performance.now();
            const timerEl = document.getElementById('codeTimer');

            try {
                let result;
                if (currentCodeLang === 'python') {
                    result = await runPythonBrowser(code);
                } else {
                    // JS and WASM both run as JavaScript
                    result = await runJSBrowser(code);
                }
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                if (timerEl) timerEl.textContent = `${elapsed}s`;
            } catch (e) {
                codeLog('Runtime error: ' + e.message, 'error');
                if (timerEl) timerEl.textContent = 'Error';
            }
        }

            try {

                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ language: lang, code, username })
                });
                const data = await res.json();
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

                if (data.stdout) codeLog(data.stdout);
                if (data.stderr) codeLog(data.stderr, 'error');
                if (data.error) codeLog(data.error, 'error');
                if (data.hint) codeLog(data.hint, 'info');
                if (data.success && !data.stdout && !data.stderr) codeLog('(no output)', 'system');

                if (timerEl) timerEl.textContent = `${elapsed}s (server)`;
            } catch (e) {
                codeLog('Connection error: ' + e.message, 'error');

        // ---- Package Install (Pyodide) ----

        async function installPyPackage() {
            if (currentCodeLang !== 'python') {
                showToast('Package install is for Python only', 'info');
                return;
            }
            const pkg = prompt('Package name (e.g., numpy, pandas, requests):');
            if (!pkg) return;

            clearCodeOutput();
            codeLog(`Installing ${pkg}...`, 'info');

            try {
                const py = await initPyodide();
                await py.loadPackage('micropip');
                const micropip = py.pyimport('micropip');
                await micropip.install(pkg);
                codeLog(`✓ ${pkg} installed successfully!`, 'info');
            } catch (e) {
                codeLog(`Failed to install ${pkg}: ${e.message}`, 'error');
                codeLog('Note: Only pure Python packages are supported in browser.', 'system');
            }
        }

        async function registerAsTool() {
            const code = document.getElementById('codeInput')?.value;
            if (!code?.trim()) { showToast('Write code first', 'info'); return; }

            const name = prompt('Tool name (lowercase, no spaces):');
            if (!name || !/^[a-z0-9_]+$/.test(name)) {
                showToast('Invalid name. Use lowercase letters, numbers, underscores.', 'error');
                return;
            }
            const description = prompt('Tool description:');
            if (!description) return;
            const inputSchema = prompt('Input JSON example (e.g., {"text": "hello"}):', '{}');

            const username = currentUser?.username || 'guest';
            const tool = {
                name,
                description,
                language: currentCodeLang,
                code,
                input_schema: inputSchema,
                username,
                created_at: new Date().toISOString(),
            };

            try {
                const res = await fetch(`${API}/tools/custom`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(tool)
                });
                const data = await res.json();
                if (data.success) {
                    customTools[name] = tool;
                    localStorage.setItem('puterra_custom_tools', JSON.stringify(customTools));
                    showToast(`Tool "${name}" registered!`, 'success');
                    codeLog(`✓ Tool "${name}" registered. The AI agent can now use it.`, 'info');
                } else {
                    showToast(data.error || 'Registration failed', 'error');
                }
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
            }
        }

        async function saveSettings() {
            const el = (id) => document.getElementById(id);
            const activeSource = document.querySelector('input[name="llm_source"]:checked')?.value || 'local';

            const payload = {
                llm_active_source: activeSource,
                llm_api_url_local: el('set_llm_url_local')?.value,
                llm_model_local: el('set_llm_model_local')?.value,
                llm_api_url_cloud: el('set_llm_url_cloud')?.value,
                llm_model_cloud: el('set_llm_model_cloud')?.value,
                max_agent_iterations: parseInt(el('set_max_iterations')?.value) || 6,
                chat_context_limit: parseInt(el('set_chat_context_limit')?.value) || 10,
                search_engine: el('set_search_engine')?.value,
                shell_enabled: el('set_shell_enabled')?.checked ?? true,

                // LLM generation
                llm_temperature: parseFloat(el('set_llm_temperature')?.value) || 0.7,
                llm_max_tokens: parseInt(el('set_llm_max_tokens')?.value) || 4096,
                llm_think: el('set_llm_think')?.checked ?? false,

                // Timeouts
                timeout_agent: parseInt(el('set_timeout_agent')?.value) || 120,
                timeout_web_fetch: parseInt(el('set_timeout_web_fetch')?.value) || 15,
                timeout_web_search: parseInt(el('set_timeout_web_search')?.value) || 15,
                timeout_image: parseInt(el('set_timeout_image')?.value) || 30,
                timeout_llm_test: parseInt(el('set_timeout_llm_test')?.value) || 60,
            };

            // Only send API keys if user typed a new one (not the masked value)
            const keyValLocal = el('set_llm_key_local')?.value || '';
            if (keyValLocal && !keyValLocal.includes('••')) {
                payload.llm_api_key_local = keyValLocal;
            }

            const keyValCloud = el('set_llm_key_cloud')?.value || '';
            if (keyValCloud && !keyValCloud.includes('••')) {
                payload.llm_api_key_cloud = keyValCloud;
            }

            // Only send admin password if user typed one
            const pwVal = el('set_admin_pw')?.value || '';
            if (pwVal) {
                payload.admin_password = pwVal;
            }

            try {
                const res = await fetch(`${API}/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Settings saved!', 'success');
                } else {
                    showToast(data.error || 'Save failed', 'error');
                }
            } catch (e) {
                showToast('Connection error', 'error');
            }
        }

        async function createShareKey() {
            const label = document.getElementById('sk_new_label')?.value?.trim();
            if (!label) { showToast('Please enter a label', 'error'); return; }
            const settings = cachedSettings || {};
            const activeSource = settings.llm_active_source || 'local';
            const defaultUrl = activeSource === 'cloud' ? settings.llm_api_url_cloud : settings.llm_api_url_local;
            const defaultModel = activeSource === 'cloud' ? settings.llm_model_cloud : settings.llm_model_local;

            const api_url = document.getElementById('sk_new_api_url')?.value?.trim() || defaultUrl || '';
            const model = document.getElementById('sk_new_model')?.value?.trim() || defaultModel || '';
            const api_key = document.getElementById('sk_new_api_key')?.value?.trim() || '';
            const maxUsesVal = document.getElementById('sk_new_max_uses')?.value?.trim();
            const max_uses = maxUsesVal ? parseInt(maxUsesVal) : null;

            if (!api_url) { showToast('API URL is required (or configure LLM settings first)', 'error'); return; }
            if (!model) { showToast('Model is required', 'error'); return; }

            try {
                const res = await fetch(`${API}/share-keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: localStorage.getItem('auth_token') || '', label, api_url, model, api_key, max_uses })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(`Share key created: ${data.key}`, 'success');
                    // Clear form
                    ['sk_new_label','sk_new_api_url','sk_new_model','sk_new_api_key','sk_new_max_uses'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.value = '';

                    showToast(data.error || 'Failed to create share key', 'error');

            } catch (e) {
                showToast('Error creating share key', 'error');
            }
        }

        async function revokeShareKey(keyId) {
            if (!confirm(`Revoke share key ${keyId}? Recipients won't be able to use it anymore.`)) return;
            try {
                const res = await fetch(`${API}/share-keys/${encodeURIComponent(keyId)}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('auth_token') || ''}` }
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Share key revoked', 'success');
                    if (cachedShareKey?.id === keyId) clearShareKey();
                    loadShareKeys();
                } else {
                    showToast(data.error || 'Failed to revoke', 'error');
                }
            } catch (e) {
                showToast('Error revoking share key', 'error');
            }
        }
